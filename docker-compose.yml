services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 1G
      - --overprovisioned
      - --node-id 0
      - --check=false
      - --reserve-memory 0M
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://${KAFKA_ADVERTISED_HOST:-localhost}:19092
    ports:
      - "19092:19092"
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info"]
      interval: 5s
      timeout: 10s
      retries: 5

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        BROKERS="redpanda:9092"

        create_topic() {
          local name=$1 partitions=$2 retention_ms=$3
          rpk topic create $$name \
            --brokers $$BROKERS \
            --partitions $$partitions \
            --replicas 1 \
            --topic-config retention.ms=$$retention_ms \
            --topic-config cleanup.policy=delete \
            2>&1 | grep -v "TOPIC_ALREADY_EXISTS" || true
          echo "Topic ready: $$name (partitions=$$partitions, retention=$${retention_ms}ms)"
        }

        # Domain events (Kafka) — high partition count for parallel consumers, 7-day retention
        create_topic identity.user.registered           4  604800000
        create_topic identity.email.verification        4  604800000
        create_topic sandbox.session.started            8  604800000
        create_topic sandbox.session.ended              8  604800000
        create_topic sandbox.challenge.solved           4  604800000
        create_topic sandbox.challenge.failed           4  604800000

        echo "All Kafka topics provisioned."

  console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console\""
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5

  sandbox-worker:
    build:
      context: ./services/sandbox
      dockerfile: Dockerfile
    container_name: sandbox-worker
    ports:
      - "8090:8090"  # WebSocket terminal + validate endpoint
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      HTTP_PORT: "8090"
      KAFKA_BROKERS: redpanda:9092
      KAFKA_CLIENT_ID: sandbox-worker
      KAFKA_GROUP_ID: sandbox-sessions
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_PUBLIC_KEY}
      SESSION_TTL_MINS: "60"
      MAX_MEMORY_MB: "512"
      MAX_CPUS: "1.0"
      DOCKER_NETWORK_MODE: "none"
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - workers



  api-gateway:
    image: kong:3.6.1-ubuntu
    container_name: api-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/usr/local/kong/declarative/kong.yml"
      KONG_PROXY_ACCESS_LOG: "/dev/stdout"
      KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
      KONG_PROXY_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
      KONG_NGINX_HTTP_LARGE_CLIENT_HEADER_BUFFERS: "4 64k"
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    volumes:
      - ./infra/kong/kong.yml:/usr/local/kong/declarative/kong.yml
    extra_hosts:
      - "auth-service:host-gateway"
      - "core-service:host-gateway"
      - "sandbox-service:${SANDBOX_SERVICE_HOST:-host-gateway}"
      - "host-gateway:host-gateway"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.83.0
    container_name: otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    ports:
      - "4318:4318" # OTLP HTTP
      - "4317:4317" # OTLP gRPC
    volumes:
      - ./infra/otel-config.yaml:/etc/otel/config.yaml:ro
    restart: unless-stopped

  loki:
    image: grafana/loki:2.8.2
    container_name: loki
    user: root
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
      - loki-wal:/wal
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.3.1
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"   # Tempo query API (for Grafana)
    volumes:
      - ./infra/tempo-config.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host-gateway:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
      - tempo
      - prometheus
    restart: unless-stopped

volumes:
  loki-data:
  loki-wal:
  tempo-data:
  prometheus-data:
  grafana-data:

