apiVersion: 1

groups:
  - orgId: 1
    name: auth-service
    folder: auth
    interval: 1m
    rules:
      - uid: high-login-failure-rate
        title: High Login Failure Rate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'rate(auth_login_total{outcome=~"invalid_credentials|account_locked"}[5m])'
              instant: true
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "rate(auth_login_total[5m])"
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A / $B > 0.1"
        for: 5m
        annotations:
          summary: "Login failure rate exceeds 10% for 5 minutes"
        labels:
          severity: warning

      - uid: high-login-latency
        title: High Login Latency (p95 > 2s)
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "histogram_quantile(0.95, rate(auth_login_duration_seconds_bucket[5m])) > 2"
              instant: true
        for: 5m
        annotations:
          summary: "Login p95 latency exceeds 2 seconds for 5 minutes"
        labels:
          severity: warning
