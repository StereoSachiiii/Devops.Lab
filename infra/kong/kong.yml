_format_version: "3.0"
_transform: true

# Global plugins
plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - http://127.0.0.1:3000
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Cookie
      exposed_headers:
        - Set-Cookie
      credentials: true
      max_age: 3600
  - name: rate-limiting
    config:
      second: 100
      limit_by: credential
      policy: redis
      redis:
        host: redis
        port: 6379
        database: 1

services:
  - name: core-service
    url: http://core-service:3003
    routes:
      - name: challenge-routes
        paths:
          - /api/challenges
        strip_path: false
      - name: session-routes
        paths:
          - /api/session
        strip_path: false
      - name: content-routes
        paths:
          - /api/content
        strip_path: true

  - name: auth-service
    url: http://auth-service:3002
    routes:
      - name: auth-routes
        paths:
          - /api/auth
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          second: 100
          limit_by: ip
          policy: redis
          redis:
            host: redis
            port: 6379
            database: 1


