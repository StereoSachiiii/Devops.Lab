_format_version: "3.0"
_transform: true

# Global plugins
plugins:
  - name: rate-limiting
    config:
      minute: 600
      limit_by: credential
      policy: redis
      redis:
        host: redis
        port: 6379
        database: 1

services:
  - name: challenge-service
    url: http://challenge-service:3004
    routes:
      - name: challenge-routes
        paths:
          - /api/challenges
          - /api/sessions
        strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp

  - name: auth-service
    url: http://auth-service:3002
    routes:
      - name: auth-routes
        paths:
          - /api/auth
    plugins:
      - name: rate-limiting
        config:
          minute: 300
          limit_by: ip
          policy: redis
          redis:
            host: redis
            port: 6379
            database: 1

  - name: content-service
    url: http://content-service:3006
    routes:
      - name: content-routes
        paths:
          - /api/content
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp

consumers:
  - username: devops-auth-consumer
    jwt_secrets:
      - key: devops-platform
        algorithm: RS256
