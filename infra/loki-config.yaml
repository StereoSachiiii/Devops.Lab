auth_enabled: false
server:
  http_listen_port: 3100
common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
memberlist:
  join_members: []
ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
storage_config:
  boltdb:
    directory: /loki/index
schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 168h
limits_config:
  enforce_metric_name: false
