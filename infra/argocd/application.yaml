apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-learning-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-username/devops-learning-platform.git'
    path: infra/helm/devops-platform
    targetRevision: main
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: devops-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
