name: CI

on:
  push:
    branches: [ "main", "feat/*", "services-*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    name: Validate Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx turbo run generate --filter=@devops/db

      - name: Lint
        run: npx turbo run lint --filter=...[HEAD~2]

      - name: Typecheck
        run: npx turbo run typecheck --filter=...[HEAD~2]

      - name: Test
        run: npx turbo run test --filter=...[HEAD~2]

