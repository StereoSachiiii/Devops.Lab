version: '3.8'

services:
  web-frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: web-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.${DOMAIN:-devops.localhost}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.devops-web.rule=Host(`${DOMAIN:-devops.localhost}`)"
      - "traefik.http.routers.devops-web.entrypoints=websecure"
      - "traefik.http.routers.devops-web.tls.certresolver=myresolver"
      - "traefik.http.services.devops-web.loadbalancer.server.port=3000"
    ports:
      - "3000:3000"
    networks:
      - app-internal
      - global-proxy-net
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    image: kong:3.6.1-ubuntu
    container_name: api-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/usr/local/kong/declarative/kong.yml"
      KONG_PROXY_ACCESS_LOG: "/dev/stdout"
      KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
      KONG_PROXY_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
      KONG_NGINX_HTTP_LARGE_CLIENT_HEADER_BUFFERS: "4 64k"
    volumes:
      - ./infra/kong/kong.yml:/usr/local/kong/declarative/kong.yml
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.devops-api.rule=Host(`api.${DOMAIN:-devops.localhost}`)"
      - "traefik.http.routers.devops-api.entrypoints=websecure"
      - "traefik.http.routers.devops-api.tls.certresolver=myresolver"
      - "traefik.http.services.devops-api.loadbalancer.server.port=8000"
    ports:
      - "8005:8000"
      - "8443:8443"
    networks:
      - app-internal
      - global-proxy-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: auth-service
    environment:
      - PORT=3002
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/appdb?schema=public}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
    networks:
      - app-internal
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  core-service:
    build:
      context: .
      dockerfile: services/core/Dockerfile
    container_name: core-service
    environment:
      - PORT=3003
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/appdb?schema=public}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - app-internal
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    container_name: notification-service
    environment:
      - PORT=3004
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
    networks:
      - app-internal
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5444:5432"
    networks:
      - app-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - app-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    networks:
      - app-internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 1G
      - --overprovisioned
      - --node-id 0
      - --check=false
      - --reserve-memory 0M
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://${KAFKA_ADVERTISED_HOST:-localhost}:19092
    networks:
      - app-internal
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info"]
      interval: 5s
      timeout: 10s
      retries: 5

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - app-internal
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        BROKERS="redpanda:9092"
        create_topic() {
          local name=$$1 partitions=$$2 retention_ms=$$3
          rpk topic create $$name --brokers $$BROKERS --partitions $$partitions --replicas 1 --topic-config retention.ms=$$retention_ms --topic-config cleanup.policy=delete 2>&1 | grep -v "TOPIC_ALREADY_EXISTS" || true
          echo "Topic ready: $$name"
        }
        create_topic identity.user.registered 4 604800000
        create_topic identity.email.verification 4 604800000
        create_topic sandbox.session.started 8 604800000
        create_topic sandbox.session.ended 8 604800000
        create_topic sandbox.challenge.solved 4 604800000
        create_topic sandbox.challenge.failed 4 604800000

  sandbox-worker:
    build:
      context: ./services/sandbox
      dockerfile: Dockerfile
    container_name: sandbox-worker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      HTTP_PORT: "8090"
      KAFKA_BROKERS: redpanda:9092
      KAFKA_CLIENT_ID: sandbox-worker
      KAFKA_GROUP_ID: sandbox-sessions
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/appdb?schema=public}
      JWT_SECRET: ${JWT_PUBLIC_KEY}
      SESSION_TTL_MINS: "60"
      MAX_MEMORY_MB: "512"
      MAX_CPUS: "1.0"
      DOCKER_NETWORK_MODE: "none"
      RABBITMQ_URL: amqp://rabbitmq:5672
    networks:
      - app-internal
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  app-internal:
  global-proxy-net:
    external: true

volumes:
  postgres-data:
