asyncapi: "2.6.0"
info:
  title: DevOps Learning Platform — Event Contracts
  version: "1.0.0"
  description: |
    This file is the single source of truth for all async events in the platform.
    
    Rules:
    - Every new event MUST be defined here first before being implemented.
    - Topic names, payload fields, and types here take precedence over any
      language-specific implementation (TypeScript classes, Go structs).
    - When a payload changes, update this file AND the relevant implementations.
    - Version the payload by bumping `version` inside the event — not the topic name.

defaultContentType: application/json

# ── Brokers ───────────────────────────────────────────────────────────────────
servers:
  kafka:
    url: localhost:19092
    protocol: kafka
    description: Redpanda (Kafka-compatible) — replayable event log
  rabbitmq:
    url: amqp://localhost:5672
    protocol: amqp
    description: RabbitMQ — transactional task queues

# ── Channels (Topics / Queues) ────────────────────────────────────────────────
channels:

  # ── Identity Domain ──────────────────────────────────────────────────────────

  identity.user.registered:
    description: |
      Emitted by: auth-service (Node/TS)
      Consumed by: notification-service
      Broker: Kafka
      Trigger: A new user account is created (email/password or OAuth).
    subscribe:
      operationId: onUserRegistered
      message:
        $ref: "#/components/messages/UserRegistered"

  identity.email.verify:
    description: |
      Emitted by: auth-service (Node/TS)
      Consumed by: notification-service
      Broker: Kafka
      Trigger: Email/password registration — notification-service sends the email.
      Note: The token is generated by auth-service and is single-use.
            notification-service does NOT need to validate it.
    subscribe:
      operationId: onEmailVerificationRequested
      message:
        $ref: "#/components/messages/EmailVerificationRequested"

  # ── Curriculum Domain ─────────────────────────────────────────────────────────

  curriculum.challenge.solved:
    description: |
      Emitted by: sandbox-service (Go)
      Consumed by: progress-service, notification-service
      Broker: Kafka
      Trigger: User code ran successfully (exit code 0).
      Note: "passed: true" is always set on this topic.
            The progress-service awards XP; notification-service may send a badge email.
    subscribe:
      operationId: onChallengeSolved
      message:
        $ref: "#/components/messages/ChallengeResult"

  curriculum.challenge.failed:
    description: |
      Emitted by: sandbox-service (Go)
      Consumed by: progress-service (for streak tracking)
      Broker: Kafka
      Trigger: User code ran but exited with a non-zero exit code, or timed out.
      Note: "passed: false" is always set on this topic.
    subscribe:
      operationId: onChallengeFailed
      message:
        $ref: "#/components/messages/ChallengeResult"

  curriculum.quiz.completed:
    description: |
      Emitted by: quiz-service (Node/TS) [NOT YET IMPLEMENTED]
      Consumed by: progress-service
      Broker: Kafka
      Trigger: A user submits answers to a quiz module.
    subscribe:
      operationId: onQuizCompleted
      message:
        $ref: "#/components/messages/QuizCompleted"

  # ── Task Queues (RabbitMQ) ────────────────────────────────────────────────────

  sandbox.sessions:
    description: |
      Published by: challenge-service (Node/TS)
      Consumed by: sandbox-service (Go)
      Broker: RabbitMQ (durable queue, QoS=5)
      Contains two message types discriminated by a 'type' field:
        - session.started: provision a new lab container
        - session.ended: destroy the container
    subscribe:
      operationId: onSessionEvent
      message:
        oneOf:
          - $ref: "#/components/messages/SessionStarted"
          - $ref: "#/components/messages/SessionEnded"

# ── Message Schemas ───────────────────────────────────────────────────────────
components:
  messages:

    # ── Envelope (all Kafka events share this wrapper) ────────────────────────
    # Every Kafka message has: topic, version, timestamp, correlationId, payload
    # The payload fields are defined per-event below.

    UserRegistered:
      name: UserRegistered
      title: User Registered
      payload:
        type: object
        required: [topic, version, timestamp, correlationId, payload]
        properties:
          topic:
            type: string
            const: "identity.user.registered"
          version:
            type: string
            example: "1.0.0"
          timestamp:
            type: string
            format: date-time
          correlationId:
            type: string
            format: uuid
          payload:
            type: object
            required: [userId, email]
            properties:
              userId:
                type: string
                description: CUID assigned by Postgres
              email:
                type: string
                format: email
              name:
                type: string
                nullable: true

    EmailVerificationRequested:
      name: EmailVerificationRequested
      title: Email Verification Requested
      payload:
        type: object
        required: [topic, version, timestamp, correlationId, payload]
        properties:
          topic:
            type: string
            const: "identity.email.verify"
          version:
            type: string
            example: "1.0.0"
          timestamp:
            type: string
            format: date-time
          correlationId:
            type: string
            format: uuid
          payload:
            type: object
            required: [userId, email, token]
            properties:
              userId:
                type: string
              email:
                type: string
                format: email
              token:
                type: string
                format: uuid
                description: |
                  Single-use token for email verification.
                  Generated by auth-service via crypto.randomUUID().
                  notification-service embeds this in the verification link.

    ChallengeResult:
      name: ChallengeResult
      title: Challenge Execution Result
      description: |
        Shared schema for both curriculum.challenge.solved and curriculum.challenge.failed.
        Consumers can discriminate using the "passed" field.
      payload:
        type: object
        required: [topic, version, timestamp, correlationId, payload]
        properties:
          topic:
            type: string
            enum:
              - "curriculum.challenge.solved"
              - "curriculum.challenge.failed"
          version:
            type: string
            example: "1.0.0"
          timestamp:
            type: string
            format: date-time
          correlationId:
            type: string
            description: Equals submissionId for traceability
          payload:
            type: object
            required: [submissionId, challengeId, userId, passed, stdout, stderr, exitCode, durationMs]
            properties:
              submissionId:
                type: string
              challengeId:
                type: string
              userId:
                type: string
              passed:
                type: boolean
                description: true on .solved topic, false on .failed topic
              stdout:
                type: string
              stderr:
                type: string
              exitCode:
                type: integer
                description: 124 = timeout, 0 = success, anything else = runtime error
              durationMs:
                type: integer
                description: Wall-clock execution time in milliseconds

    QuizCompleted:
      name: QuizCompleted
      title: Quiz Completed
      description: NOT YET IMPLEMENTED — schema reserved for quiz-service
      payload:
        type: object
        required: [topic, version, timestamp, correlationId, payload]
        properties:
          topic:
            type: string
            const: "curriculum.quiz.completed"
          version:
            type: string
            example: "1.0.0"
          timestamp:
            type: string
            format: date-time
          correlationId:
            type: string
            format: uuid
          payload:
            type: object
            required: [userId, quizId, score, totalQuestions]
            properties:
              userId:
                type: string
              quizId:
                type: string
              score:
                type: integer
              totalQuestions:
                type: integer
              xpAwarded:
                type: integer

    SandboxJob:
      name: SandboxJob
      title: Sandbox Execution Job
      description: Task message placed on the RabbitMQ sandbox.jobs queue by challenge-service.
      payload:
        type: object
        required: [submissionId, challengeId, userId, language, code]
        properties:
          submissionId:
            type: string
            description: Matches the Submission.id in Postgres
          challengeId:
            type: string
          userId:
            type: string
          language:
            type: string
            enum: [bash, sh, python3, node]
            description: |
              Determines which Docker image is used.
              bash/sh  → bash:5
              python3  → python:3.12-slim
              node     → node:20-slim
          code:
            type: string
            description: Raw code string to execute inline (not a file path)
          timeoutSecs:
            type: integer
            default: 30
            maximum: 60
            description: |
              Caller-specified timeout. The sandbox worker enforces its own
              MAX_TIMEOUT_SECS cap regardless of this value.

    SessionStarted:
      name: SessionStarted
      title: Sandbox Session Started
      payload:
        type: object
        required: [type, sessionId, userId, challengeId]
        properties:
          type:
            type: string
            const: "session.started"
          sessionId:
            type: string
          userId:
            type: string
          challengeId:
            type: string

    SessionEnded:
      name: SessionEnded
      title: Sandbox Session Ended
      payload:
        type: object
        required: [type, sessionId, reason]
        properties:
          type:
            type: string
            const: "session.ended"
          sessionId:
            type: string
          reason:
            type: string
            enum: [completed, terminated, expired]
